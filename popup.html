<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px;
      padding: 15px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      color: #333;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      color: #333;
    }

    small {
      color: #666;
      display: block;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover {
      background: #0056b3;
    }

    p {
      font-size: 11px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Producer.ai Suite</h1>
    <small>v3.2</small>
  </div>

  <div class="panel">
    <button id="openSidebarBtn" class="primary-btn">
      Open Sidebar Interface
    </button>
    <p>
      All controls have moved to the sidebar.
    </p>
  </div>

  <script src="popup.js"></script>
</body>

</html>
